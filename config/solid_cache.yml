default: &default
  store_options:
    max_age: <%= 7.days.to_i %>      # 604,800 seconds — our embedding cache TTL
    max_size: <%= 64.megabytes %>    # conservative for Render.com free tier
    namespace: <%= Rails.env %>      # isolates dev/test/production entries

development:
  <<: *default
  store_options:
    max_age: <%= 1.day.to_i %>
    max_size: <%= 32.megabytes %>
    namespace: <%= Rails.env %>

test:
  <<: *default
  store_options:
    max_age: <%= 1.hour.to_i %>
    max_size: <%= 16.megabytes %>
    namespace: <%= Rails.env %>

production:
  <<: *default
  store_options:
    max_age: <%= 7.days.to_i %>
    max_size: <%= 64.megabytes %>    # safe for Render.com free tier Postgres
    namespace: <%= Rails.env %>