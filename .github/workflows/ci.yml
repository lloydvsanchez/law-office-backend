name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Spin up a PostgreSQL service container for the tests to use
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rails_test
        ports:
          - 5432:5432
        # Ensure postgres is fully up and running before the steps start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.4' # Matches your Gemfile exactly
          bundler-cache: true   # Automatically runs 'bundle install' and caches gems

      - name: Run tests
        env:
          RAILS_ENV: test
          # Provide the full database URL so Rails can connect immediately
          DATABASE_URL: postgres://postgres:password@localhost:5432/rails_test
        run: |
          bin/rails db:test:prepare
          bin/rails test